name: money_manager
description: A production-level offline personal money management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  sqflite: ^2.3.2
  path_provider: ^2.0.15
  flutter_secure_storage: ^9.0.0
  fl_chart: ^0.64.0
  intl: ^0.19.0
  crypto: ^3.0.2
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2

flutter:
  uses-material-design: true
  assets:
    - assets/

dev_dependencies:
  flutter_test:
    sdk: flutter

